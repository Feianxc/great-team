<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="28" fill="#0F172A"/>
  <rect x="78" y="54" width="1044" height="652" rx="22" fill="#F8FAFC"/>
  <rect x="78" y="54" width="1044" height="86" rx="22" fill="#E2E8F0"/>
  <text x="120" y="108" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Decision Memo</text>
  <text x="865" y="108" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">Great Team</text>

  <text x="118" y="192" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">1. Project Essence</text>
  <text x="118" y="228" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">• what this project actually is</text>
  <text x="118" y="260" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">• who it is for</text>
  <text x="118" y="292" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">• what must not be lost</text>

  <text x="118" y="360" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">2. Key Tensions</text>
  <text x="118" y="396" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">• the central tradeoff</text>
  <text x="118" y="428" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">• the biggest unearned promise</text>

  <text x="118" y="496" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">3. Decision</text>
  <text x="118" y="532" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="600">• strongest cut / defer</text>
  <text x="118" y="564" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">• chosen path</text>

  <text x="118" y="632" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">4. Next Experiment</text>
  <text x="118" y="668" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">• smallest falsifiable test</text>

  <rect x="720" y="178" width="308" height="380" rx="18" fill="#EEF2FF" stroke="#C4B5FD"/>
  <text x="748" y="226" fill="#4C1D95" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">What changes</text>
  <text x="748" y="274" fill="#5B21B6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">• what to build</text>
  <text x="748" y="308" fill="#5B21B6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">• what not to build</text>
  <text x="748" y="342" fill="#5B21B6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">• what to cut from V1</text>
  <text x="748" y="376" fill="#5B21B6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">• what to validate first</text>
  <text x="748" y="430" fill="#312E81" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">The goal is not to sound smarter.</text>
  <text x="748" y="462" fill="#312E81" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">The goal is to change the next build decision.</text>

  <rect x="720" y="586" width="308" height="78" rx="14" fill="#111827"/>
  <text x="747" y="634" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Memo-first wedge</text>
</svg>
